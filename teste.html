<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DevCast — teste WebSocket</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        #mensagens { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        input { width: 70%; padding: 8px; }
        button { padding: 8px 16px; margin-left: 8px; cursor: pointer; }
        .status { color: gray; font-size: 12px; margin-bottom: 10px; }
        .msg { margin: 4px 0; }
        .msg span { font-weight: bold; color: #2563eb; }
    </style>
</head>
<body>
<h2>DevCast — chat ao vivo</h2>
<div class="status" id="status">Desconectado</div>
<div id="mensagens"></div>
<input type="text" id="input" placeholder="Digite uma mensagem..." />
<button onclick="enviar()">Enviar</button>

<script>
    const USER_ID  = "b95ef654-959e-4ad8-ac6f-399fd0754dc6";
    const ROOM_ID  = "767e0f9b-29da-4662-bdb2-f9328e3be266";

    const socket = new SockJS("http://localhost:8001/ws");
    const client = Stomp.over(socket);
    client.debug = null; // silencia logs do STOMP no console

    client.connect({}, function () {
        document.getElementById("status").textContent = "Conectado à sala: geral";
        document.getElementById("status").style.color = "green";

        // assina o tópico da sala
        client.subscribe("/topic/sala." + ROOM_ID, function (msg) {
            const data = JSON.parse(msg.body);
            const div  = document.getElementById("mensagens");
            div.innerHTML += `<div class="msg"><span>${data.senderUsername}</span>: ${data.content}</div>`;
            div.scrollTop = div.scrollHeight;
        });
    });

    function enviar() {
        const input = document.getElementById("input");
        if (!input.value.trim()) return;

        client.send("/app/chat/" + ROOM_ID, {}, JSON.stringify({
            roomId:   ROOM_ID,
            senderId: USER_ID,
            content:  input.value
        }));

        input.value = "";
    }

    document.getElementById("input").addEventListener("keydown", function (e) {
        if (e.key === "Enter") enviar();
    });
</script>
</body>
</html>
