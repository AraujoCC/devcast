spring.application.name=devcast

# Banco — usa variável de ambiente no Render, local em dev
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/devcast}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:dev2026}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Porta — o Render injeta a porta via variável de ambiente
server.port=${PORT:8001}